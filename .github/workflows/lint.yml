name: Lint & Validate

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Ruff + Mypy + pip-audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: agent_browser/requirements.txt

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy pip-audit
          pip install -r agent_browser/requirements.txt --no-deps

      - name: Ruff lint
        run: ruff check agent_browser/

      - name: Ruff format check
        run: ruff format --check agent_browser/

      - name: Mypy type check
        run: mypy agent_browser/ --ignore-missing-imports --no-strict-optional

      - name: pip-audit (dependency vulnerability scan)
        run: pip-audit --requirement agent_browser/requirements.txt --skip-editable
